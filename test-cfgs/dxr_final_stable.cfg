// DarkWolf RTCW TRUE RT M1 - FINAL STABLE preset
// Conservative real DXR shadows/reflection-GI visibility with smooth full-res composite.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 160
set r_dxrDispatchHeight 90
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 14400
set r_dxrSafeFullMaxPixels 14400
set r_dxrDispatchEveryNFrames 4

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 160
set r_dxrMaxLights 2
set r_dxrShadowSamples 1
set r_dxrAOSamples 1
set r_dxrSkySamples 1
set r_dxrSync 0

set r_dxrFallbackLight 0
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.34
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.45

set r_dxrAmbientIntensity 1.48
set r_dxrLegacyBlend 0.66
set r_dxrExposure 1.22
set r_dxrShadowBias 0.045
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
