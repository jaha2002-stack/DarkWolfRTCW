// DarkWolf RTCW TRUE RT M2/M3 - FINAL STABLE
// Visible RT contact shadows/specular, conservative resolution.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 192
set r_dxrDispatchHeight 108
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 20736
set r_dxrSafeFullMaxPixels 20736
set r_dxrDispatchEveryNFrames 3

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 384
set r_dxrMaxLights 4
set r_dxrShadowSamples 2
set r_dxrAOSamples 2
set r_dxrSkySamples 2
set r_dxrSync 0

set r_dxrFallbackLight 1
set r_dxrFallbackLightRadius 700
set r_dxrFallbackLightIntensity 1.4
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.55
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.72

set r_dxrAmbientIntensity 1.18
set r_dxrLegacyBlend 0.42
set r_dxrExposure 1.18
set r_dxrShadowBias 0.045
set r_dxrRTStrength 1.35
set r_dxrSpecularStrength 1.85
set r_dxrReflectionStrength 1.10
set r_dxrShadowStrength 1.15
set r_dxrDenoiseStrength 0.65
set r_dxrTemporalStrength 0.50
set r_dxrGIStrength 0.80
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
