// DarkWolf RTCW FINAL STABLE DXR preset
// Safest playable mode: visible but conservative RT contact lighting.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 128
set r_dxrDispatchHeight 72
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 9216
set r_dxrSafeFullMaxPixels 9216
set r_dxrDispatchEveryNFrames 4

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 128
set r_dxrMaxLights 1
set r_dxrShadowSamples 1
set r_dxrAOSamples 0
set r_dxrSkySamples 0
set r_dxrSync 1

set r_dxrFallbackLight 0
set r_dxrFallbackLightRadius 650
set r_dxrFallbackLightIntensity 2.0
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.20
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.22

set r_dxrAmbientIntensity 1.55
set r_dxrLegacyBlend 0.84
set r_dxrExposure 1.20
set r_dxrShadowBias 0.04
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
