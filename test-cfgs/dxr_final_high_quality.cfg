// DarkWolf RTCW TRUE RT M1 - FINAL HIGH QUALITY preset
// Main recommended mode: higher RT resolution, visible RT shadow/AO/sky/reflection contribution, no full-res dangerous dispatch.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 224
set r_dxrDispatchHeight 126
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 28224
set r_dxrSafeFullMaxPixels 28224
set r_dxrDispatchEveryNFrames 3

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 256
set r_dxrMaxLights 4
set r_dxrShadowSamples 2
set r_dxrAOSamples 2
set r_dxrSkySamples 1
set r_dxrSync 0

set r_dxrFallbackLight 0
set r_dxrFallbackLightRadius 650
set r_dxrFallbackLightIntensity 2.0
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.44
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.58

set r_dxrAmbientIntensity 1.40
set r_dxrLegacyBlend 0.58
set r_dxrExposure 1.24
set r_dxrShadowBias 0.045
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
