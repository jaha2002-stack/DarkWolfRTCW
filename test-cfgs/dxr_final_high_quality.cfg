// DarkWolf RTCW TRUE RT M2/M3 - FINAL HIGH QUALITY
// Main recommended mode. Not full-res, but restores visible RT/specular/shadows.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 256
set r_dxrDispatchHeight 144
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 36864
set r_dxrSafeFullMaxPixels 36864
set r_dxrDispatchEveryNFrames 2

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 768
set r_dxrMaxLights 8
set r_dxrShadowSamples 3
set r_dxrAOSamples 3
set r_dxrSkySamples 3
set r_dxrSync 0

set r_dxrFallbackLight 1
set r_dxrFallbackLightRadius 780
set r_dxrFallbackLightIntensity 1.9
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.68
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.82

set r_dxrAmbientIntensity 1.05
set r_dxrLegacyBlend 0.30
set r_dxrExposure 1.22
set r_dxrShadowBias 0.042
set r_dxrRTStrength 1.65
set r_dxrSpecularStrength 2.35
set r_dxrReflectionStrength 1.45
set r_dxrShadowStrength 1.35
set r_dxrDenoiseStrength 0.70
set r_dxrTemporalStrength 0.58
set r_dxrGIStrength 1.05
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
