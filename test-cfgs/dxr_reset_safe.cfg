// DarkWolf RTCW safe reset. Use if any DXR preset misbehaves.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 0
set r_dxrDebug 0
set r_dxrDebugMode 0
set r_dxrSafeMode 1
set r_dxrNoDispatch 0
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrDispatchMode 4
set r_dxrDispatchWidth 192
set r_dxrDispatchHeight 108
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 20736
set r_dxrSafeFullMaxPixels 20736
set r_dxrDispatchEveryNFrames 3
set r_dxrMaxWorldMeshes 384
set r_dxrMaxLights 4
set r_dxrFallbackLight 0
set r_dxrSunEnable 0
set r_dxrAOSamples 0
set r_dxrSkySamples 0
set r_dxrSync 0
set r_dxrRTStrength 1.0
set r_dxrSpecularStrength 1.0
set r_dxrReflectionStrength 1.0
set r_dxrShadowStrength 1.0
set r_dxrDenoiseStrength 0.0
set r_dxrTemporalStrength 0.0
set r_dxrGIStrength 0.0

spdevmap escape1
