// DarkWolf RTCW TRUE RT M2/M3 - EXPERIMENTAL DXR ULTRA
// Strongest visible RT mode. Not main mode; use only after HIGH_QUALITY is stable.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 4
set r_dxrDispatchWidth 320
set r_dxrDispatchHeight 180
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 57600
set r_dxrSafeFullMaxPixels 57600
set r_dxrDispatchEveryNFrames 2

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 1024
set r_dxrMaxLights 12
set r_dxrShadowSamples 4
set r_dxrAOSamples 4
set r_dxrSkySamples 4
set r_dxrSync 0

set r_dxrFallbackLight 1
set r_dxrFallbackLightRadius 850
set r_dxrFallbackLightIntensity 2.6
set r_dxrSunEnable 1
set r_dxrSunIntensity 0.80
set r_dxrSunPitch 42
set r_dxrSunYaw 135
set r_dxrSunColor "1.0 0.92 0.78"
set r_dxrSunShadowStrength 0.90

set r_dxrAmbientIntensity 0.92
set r_dxrLegacyBlend 0.18
set r_dxrExposure 1.26
set r_dxrShadowBias 0.040
set r_dxrRTStrength 2.05
set r_dxrSpecularStrength 2.95
set r_dxrReflectionStrength 1.85
set r_dxrShadowStrength 1.55
set r_dxrDenoiseStrength 0.72
set r_dxrTemporalStrength 0.62
set r_dxrGIStrength 1.25
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
