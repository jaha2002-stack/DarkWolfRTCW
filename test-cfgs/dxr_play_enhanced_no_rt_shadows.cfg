// DarkWolf RTCW enhanced non-pixelated fallback
// Fullscreen G-buffer copy/no full lighting. Use if the RT shadow preset ever shows artifacts.
developer 0
logfile 0
cg_drawFPS 1

set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrValidateSBT 1
set r_dxrValidateUAV 1
set r_dxrFreezeScene 1
set r_dxrForceSafeFullLighting 1
set r_dxrBuildInterval 9999
set r_dxrCompositeBlocks 1

set r_dxrDispatchMode 2
set r_dxrDispatchWidth 0
set r_dxrDispatchHeight 0
set r_dxrDispatchScale 1.0
set r_dxrRenderScale 1.0
set r_dxrMaxDispatchPixels 0
set r_dxrSafeFullMaxPixels 9216
set r_dxrDispatchEveryNFrames 1

set r_dxrPerfPreset 0
set r_dxrMaxWorldMeshes 128
set r_dxrMaxLights 0
set r_dxrShadowSamples 1
set r_dxrAOSamples 0
set r_dxrSkySamples 0
set r_dxrSync 0

set r_dxrFallbackLight 0
set r_dxrSunEnable 0
set r_dxrAmbientIntensity 1.45
set r_dxrLegacyBlend 0.90
set r_dxrExposure 1.15
set r_dxrShadowBias 0.04
set r_dxrDebug 0
set r_dxrDebugMode 0

spdevmap escape1
