name: DarkWolf PVS Hotfix Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply PVS hotfix patch
        shell: pwsh
        run: |
          ./scripts/apply-pvs-hotfix.ps1

      - name: Build DarkWolf
        shell: pwsh
        run: |
          ./scripts/build-windows.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-PVS-Hotfix-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
