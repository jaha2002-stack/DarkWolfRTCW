name: DarkWolf DXR Clean Visual Stability Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Apply Clean Visual Stability patch stack
        shell: pwsh
        run: ./scripts/apply-dxr-clean-visual-stability.ps1

      - name: Build clean visual runtime package
        shell: pwsh
        run: ./scripts/build-windows-clean-release.ps1 -Configuration '${{ inputs.configuration }}'

      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length

      - name: Upload clean visual stability artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Clean-Visual-Stability-${{ inputs.configuration }}
          path: dist/**
          if-no-files-found: error
