name: DarkWolf DXR Clean Visual Performance Build

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options: [Release, Debug]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
      - name: Apply Clean Visual Performance stack
        shell: pwsh
        run: ./scripts/apply-dxr-clean-visual-performance.ps1
      - name: Verify performance source edits
        shell: pwsh
        run: ./scripts/verify-dxr-clean-visual-performance.ps1
      - name: Build clean visual performance runtime package
        shell: pwsh
        run: ./scripts/build-windows-clean-release.ps1 -Configuration '${{ inputs.configuration }}'
      - name: Copy performance launch files
        shell: pwsh
        run: |
          Copy-Item test-bats/RUN_CLEAN_VISUAL_RT_BALANCED.bat dist/ -Force
          Copy-Item test-bats/RUN_CLEAN_VISUAL_RT_PERFORMANCE.bat dist/ -Force
          Copy-Item test-bats/RUN_CLEAN_VISUAL_RT_MAXFPS.bat dist/ -Force
          Copy-Item test-bats/RUN_CLEAN_VISUAL_RT_EXACT_ORIGINAL.bat dist/ -Force
          Copy-Item test-bats/RUN_RESET_SAFE_NO_DXR.bat dist/ -Force
          New-Item -ItemType Directory -Path dist/main -Force | Out-Null
          Copy-Item main/dxr_clean_visual_balanced.cfg dist/main/ -Force
          Copy-Item main/dxr_clean_visual_performance.cfg dist/main/ -Force
          Copy-Item main/dxr_clean_visual_maxfps.cfg dist/main/ -Force
          Copy-Item main/dxr_clean_visual_exact_original.cfg dist/main/ -Force
          Copy-Item main/dxr_reset_safe.cfg dist/main/ -Force
          Copy-Item README_CLEAN_VISUAL_PERFORMANCE_RU.md dist/ -Force
      - name: Show packaged files
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse | Format-Table FullName, Length
      - name: Upload clean visual performance artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkWolf-DXR-Clean-Visual-Performance-Release
          path: dist/**
          if-no-files-found: error
