// Reset to stable no-DXR mode.
// Copy to main/ and run: \exec dxr_test_reset_stable.cfg

set r_dxr 0
set r_dxrDebug 0
set r_dxrDebugMode 0
set r_dxrFallbackLight 0
set r_dxrSunEnable 0
set r_dxrSafeMode 1
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrMaxWorldMeshes 0
set r_dxrErrorLimit 8
set developer 0
set logfile 0
vid_restart
