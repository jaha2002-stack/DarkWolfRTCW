// Test 05: same as Test 04, but with 2048 BSP RT world meshes.
// Run only if Test 04 is stable.
// Copy to main/ and run: \exec dxr_test_05_dispatch_2048.cfg

developer 1
logfile 2
set r_dxr 1
set r_dxrSafeMode 1
set r_dxrErrorLimit 8
set r_dxrNoBuildBLAS 0
set r_dxrNoBuildTLAS 0
set r_dxrNoDispatch 0
set r_dxrMaxWorldMeshes 2048
set r_dxrPerfPreset 0
set r_dxrMaxLights 0
set r_dxrShadowSamples 1
set r_dxrAOSamples 0
set r_dxrSkySamples 0
set r_dxrSync 0
set r_dxrFallbackLight 0
set r_dxrSunEnable 0
set r_dxrDebug 1
set r_dxrDebugMode 0
vid_restart
spdevmap escape1
